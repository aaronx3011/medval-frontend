version: "3.8"

services:
  dashboard:
    build:
      context: .
      args:
        VITE_API_URL: /api
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - ./wg0.conf:/etc/wireguard/wg0.conf:ro
    ports:
      - "8080:80"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
